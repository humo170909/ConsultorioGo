<!DOCTYPE html>
<html lang="es" data-theme="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <meta name="description" content="Consultorio Robert Goicochea — Sistema de Gestión Clínica">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="theme-color" content="#1d4ed8">
    <title>Consultorio Robert Goicochea</title>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="assets/css/style.css">
</head>
<body>

    <!-- Pantalla de carga -->
    <div id="loadingScreen" class="loading-screen">
        <div class="loading-logo">
            <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 44 44" fill="none">
                <ellipse cx="22" cy="22" rx="18" ry="11" stroke="white" stroke-width="2" fill="none"/>
                <circle cx="22" cy="22" r="5" fill="white"/>
                <circle cx="22" cy="22" r="2.5" fill="#1d4ed8"/>
            </svg>
        </div>
        <svg class="spinner" xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="#1d4ed8" stroke-width="2.5"><line x1="12" y1="2" x2="12" y2="6"/><line x1="12" y1="18" x2="12" y2="22"/><line x1="4.93" y1="4.93" x2="7.76" y2="7.76"/><line x1="16.24" y1="16.24" x2="19.07" y2="19.07"/><line x1="2" y1="12" x2="6" y2="12"/><line x1="18" y1="12" x2="22" y2="12"/><line x1="4.93" y1="19.07" x2="7.76" y2="16.24"/><line x1="16.24" y1="7.76" x2="19.07" y2="4.93"/></svg>
        <p>Cargando sistema...</p>
    </div>

    <!-- ===== APP LAYOUT ===== -->
    <div class="app-layout" id="appLayout" style="display:none">

        <!-- TOP BAR -->
        <header class="top-bar" id="topBar" role="banner">
            <!-- Botón Volver (visible solo en sub-rutas) -->
            <button class="top-bar-back" id="backBtn" style="display:none" aria-label="Volver">
                <svg xmlns="http://www.w3.org/2000/svg" width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="15 18 9 12 15 6"/></svg>
            </button>

            <!-- Título de la página -->
            <h1 class="top-bar-title" id="pageTitle">Inicio</h1>

            <!-- Acciones de la derecha -->
            <div class="top-bar-actions" id="topBarActions">
                <!-- Botón de búsqueda rápida -->
                <button class="top-bar-btn" id="btnHeaderSearch" aria-label="Buscar paciente" title="Buscar">
                    <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
                </button>

                <!-- Toggle de tema -->
                <button class="top-bar-btn" id="themeToggle" aria-label="Cambiar tema" title="Cambiar tema">
                    <svg id="iconSunApp" xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/><line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/></svg>
                    <svg id="iconMoonApp" xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="display:none"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>
                </button>

                <!-- Avatar usuario -->
                <div class="top-bar-avatar" id="userAvatar" title="Mi perfil" role="button" tabindex="0">?</div>
            </div>
        </header>

        <!-- Búsqueda global (overlay encima del top-bar) -->
        <div id="searchOverlay" style="display:none;position:fixed;inset:0;z-index:9500;background:var(--bg-overlay);backdrop-filter:blur(3px);-webkit-backdrop-filter:blur(3px);" onclick="App.closeSearch()">
            <div style="background:var(--bg-surface);margin-top:var(--top-bar-h);padding:1rem;box-shadow:var(--shadow-md);max-height:calc(100dvh - var(--top-bar-h));overflow-y:auto;" onclick="event.stopPropagation()">
                <div class="search-wrapper" style="position:relative;margin-bottom:0.5rem">
                    <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
                    <input id="globalSearchInput" class="search-input" type="search" placeholder="Buscar por nombre, DNI o celular..." autocomplete="off">
                </div>
                <div id="globalSearchResults" style="max-height:55dvh;overflow-y:auto;-webkit-overflow-scrolling:touch;"></div>
            </div>
        </div>

        <!-- CONTENIDO PRINCIPAL -->
        <main id="mainContent" class="main-content" role="main" aria-live="polite">
            <!-- Los módulos renderizan aquí -->
        </main>

        <!-- BOTTOM NAVIGATION -->
        <nav class="bottom-nav" role="navigation" aria-label="Navegación principal">

            <!-- Inicio -->
            <button class="nav-btn active" data-route="dashboard" aria-label="Inicio">
                <svg xmlns="http://www.w3.org/2000/svg" width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>
                <span>Inicio</span>
            </button>

            <!-- Pacientes -->
            <button class="nav-btn" data-route="patients" aria-label="Pacientes">
                <svg xmlns="http://www.w3.org/2000/svg" width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></svg>
                <span>Pacientes</span>
            </button>

            <!-- FAB central: acción contextual -->
            <div class="nav-fab-slot">
                <button class="nav-fab" id="navFab" aria-label="Acción rápida" aria-haspopup="true" aria-expanded="false">
                    <!-- [MEJORA] fab-icon-plus permite animación de rotación al abrir menú -->
                    <span class="fab-icon-plus">
                        <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
                    </span>
                </button>
            </div>

            <!-- [MEJORA] Separador sidebar (solo visible en desktop ≥1024px) -->
            <div class="nav-divider"></div>

            <!-- [MEJORA] Acciones rápidas de sidebar (solo desktop — FAB reemplazado) -->
            <button class="nav-btn nav-sidebar-only" onclick="Router.navigate('new-consultation')" aria-label="Nueva Consulta">
                <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="12" y1="18" x2="12" y2="12"/><line x1="9" y1="15" x2="15" y2="15"/></svg>
                <span>Nueva Consulta</span>
            </button>
            <button class="nav-btn nav-sidebar-only" onclick="Router.navigate('new-patient')" aria-label="Nuevo Paciente">
                <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><line x1="19" y1="8" x2="19" y2="14"/><line x1="22" y1="11" x2="16" y2="11"/></svg>
                <span>Nuevo Paciente</span>
            </button>

            <!-- Historial -->
            <button class="nav-btn" data-route="history" aria-label="Historial">
                <svg xmlns="http://www.w3.org/2000/svg" width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/><polyline points="10 9 9 9 8 9"/></svg>
                <span>Historial</span>
            </button>

            <!-- Más / Configuración -->
            <button class="nav-btn" data-route="settings" aria-label="Configuración">
                <svg xmlns="http://www.w3.org/2000/svg" width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg>
                <span>Más</span>
            </button>

        </nav>

    </div><!-- /app-layout -->

    <!-- [MEJORA] FAB Speed Dial Menu — menú contextual flotante -->
    <div id="fabMenu" class="fab-menu" aria-hidden="true">
        <div class="fab-menu-backdrop" id="fabMenuBackdrop"></div>
        <div class="fab-menu-items" id="fabMenuItems"></div>
    </div>

    <!-- Contenedor de toasts -->
    <div id="toast-container" role="region" aria-label="Notificaciones" aria-live="polite"></div>

    <!-- Raíz de modales -->
    <div id="modal-root"></div>

    <!-- ===== SCRIPTS ===== -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.31/jspdf.plugin.autotable.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>

    <script src="assets/js/config.js"></script>
    <script src="assets/js/utils.js"></script>
    <script src="assets/js/notifications.js"></script>
    <script src="assets/js/modules/dashboard.js"></script>
    <script src="assets/js/modules/patients.js"></script>
    <script src="assets/js/modules/clinical.js"></script>
    <script src="assets/js/modules/documents.js"></script>
    <script src="assets/js/modules/reports.js"></script>
    <script src="assets/js/auth.js"></script>
    <script src="assets/js/router.js"></script>
    <script src="assets/js/app.js"></script>

</body>
</html>
