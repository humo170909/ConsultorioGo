<!DOCTYPE html>
<html lang="es" data-theme="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Sistema de Gestión Clínica — Consultorio Robert Goicochea">
    <title>Consultorio Robert Goicochea — Iniciar Sesión</title>

    <!-- Fuente -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">

    <!-- Estilos -->
    <link rel="stylesheet" href="assets/css/style.css">

    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="default">
    <meta name="theme-color" content="#1d4ed8">
</head>
<body class="auth-body">


    <div class="auth-container">

        <!-- ===================== PANEL IZQUIERDO: LOGIN ===================== -->
        <div class="auth-form-side">
            <div class="auth-form-container">

                <!-- Branding solo visible en móvil -->
                <div class="auth-mobile-brand">
                    <div class="auth-mobile-logo">
                        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 44 44" fill="none">
                            <ellipse cx="22" cy="22" rx="18" ry="11" stroke="white" stroke-width="2" fill="none"/>
                            <circle cx="22" cy="22" r="5" fill="white"/>
                            <circle cx="22" cy="22" r="2.5" fill="#1d4ed8"/>
                        </svg>
                    </div>
                    <h1>Consultorio Robert Goicochea</h1>
                    <p>Sistema de Gestión Clínica Optométrica</p>
                </div>

                <div class="auth-form-header">
                    <h2>Iniciar Sesión</h2>
                    <p>Ingresa tus credenciales para acceder</p>
                </div>

                <!-- Alerta de error global -->
                <div id="loginAlert" class="alert alert-error" style="display:none; margin-bottom:1rem;" role="alert"></div>

                <form id="loginForm" class="auth-form" novalidate autocomplete="on">

                    <!-- Email -->
                    <div class="form-group">
                        <label for="email" class="form-label">Correo electrónico</label>
                        <div class="input-wrapper">
                            <svg class="input-icon" xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"/><polyline points="22,6 12,13 2,6"/></svg>
                            <input
                                type="email"
                                id="email"
                                name="email"
                                class="form-input"
                                placeholder="optometra@consultorio.com"
                                autocomplete="email"
                                required
                                aria-describedby="emailError"
                            >
                        </div>
                        <span class="field-error" id="emailError" role="alert"></span>
                    </div>

                    <!-- Contraseña -->
                    <div class="form-group">
                        <div style="display:flex; align-items:center; justify-content:space-between;">
                            <label for="password" class="form-label">Contraseña</label>
                        </div>
                        <div class="input-wrapper">
                            <svg class="input-icon" xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="11" width="18" height="11" rx="2" ry="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>
                            <input
                                type="password"
                                id="password"
                                name="password"
                                class="form-input has-toggle"
                                placeholder="••••••••"
                                autocomplete="current-password"
                                required
                                aria-describedby="passwordError"
                            >
                            <button type="button" class="input-toggle" id="togglePwd" aria-label="Mostrar contraseña">
                                <svg id="eyeShow" xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
                                <svg id="eyeHide" xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="display:none"><path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24"/><line x1="1" y1="1" x2="23" y2="23"/></svg>
                            </button>
                        </div>
                        <span class="field-error" id="passwordError" role="alert"></span>
                    </div>

                    <!-- Botón de acceso -->
                    <button type="submit" class="btn btn-primary btn-full" id="loginBtn">
                        <span id="btnText">Iniciar Sesión</span>
                        <span id="btnLoader" style="display:none" class="btn-loader">
                            <svg class="spinner" xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><line x1="12" y1="2" x2="12" y2="6"/><line x1="12" y1="18" x2="12" y2="22"/><line x1="4.93" y1="4.93" x2="7.76" y2="7.76"/><line x1="16.24" y1="16.24" x2="19.07" y2="19.07"/><line x1="2" y1="12" x2="6" y2="12"/><line x1="18" y1="12" x2="22" y2="12"/><line x1="4.93" y1="19.07" x2="7.76" y2="16.24"/><line x1="16.24" y1="7.76" x2="19.07" y2="4.93"/></svg>
                            Verificando...
                        </span>
                    </button>

                </form>

            </div>
        </div>

        <!-- ===================== PANEL DERECHO: BRANDING ===================== -->
        <div class="auth-branding">
            <div class="auth-branding-content">
                <h1>Consultorio<br>Robert Goicochea</h1>
                <p>Sistema de Gestión Clínica Optométrica</p>
            </div>
        </div>

    </div><!-- /auth-container -->

    <!-- Supabase CDN -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>

    <!-- Config y Login -->
    <script src="assets/js/config.js"></script>
    <script src="assets/js/login.js"></script>

</body>
</html>
